<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>비밀번호 재설정</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #f5f6fa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .box {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      padding: 2rem;
      width: 100%;
      max-width: 400px;
    }
    h1 { font-size: 1.25rem; margin-bottom: 1.5rem; color: #2c3e50; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: 0.85rem; font-weight: 500; color: #5d6d7e; margin-bottom: 0.35rem; }
    .form-group input {
      width: 100%;
      padding: 0.6rem 0.75rem;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      font-size: 0.95rem;
    }
    .form-group input:focus { outline: none; border-color: #2980b9; }
    .btn {
      padding: 0.6rem 1.25rem;
      border-radius: 6px;
      font-size: 0.95rem;
      font-family: inherit;
      cursor: pointer;
      border: none;
      width: 100%;
      margin-top: 0.5rem;
    }
    .btn-primary { background: #3498db; color: #fff; }
    .btn-primary:hover { background: #2980b9; }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    .error { color: #e74c3c; font-size: 0.85rem; margin-top: 0.5rem; }
    .success { color: #27ae60; font-size: 0.9rem; margin-top: 1rem; }
    .success a { color: #2980b9; }
  </style>
</head>
<body>
  <div class="box">
    <h1>비밀번호 재설정</h1>
    <div id="formWrap">
      <div class="form-group">
        <label>새 비밀번호 (4자 이상)</label>
        <input type="password" id="newPassword" placeholder="새 비밀번호" />
      </div>
      <div class="form-group">
        <label>비밀번호 확인</label>
        <input type="password" id="newPasswordConfirm" placeholder="비밀번호 다시 입력" />
      </div>
      <p id="error" class="error" style="display:none;"></p>
      <button type="button" class="btn btn-primary" id="submitBtn">비밀번호 변경</button>
    </div>
    <div id="successWrap" style="display:none;">
      <p class="success">비밀번호가 변경되었습니다.</p>
      <p style="margin-top:0.5rem;"><a href="/">로그인 페이지로 이동</a></p>
    </div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');
    const formWrap = document.getElementById('formWrap');
    const successWrap = document.getElementById('successWrap');
    const errorEl = document.getElementById('error');
    const submitBtn = document.getElementById('submitBtn');

    if (!token) {
      formWrap.innerHTML = '<p class="error">유효하지 않은 링크입니다. 비밀번호 찾기에서 다시 요청하세요.</p><p style="margin-top:1rem;"><a href="/">로그인</a></p>';
    } else {
      document.getElementById('submitBtn').addEventListener('click', async () => {
        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('newPasswordConfirm').value;
        errorEl.style.display = 'none';
        if (!newPassword || newPassword.length < 4) {
          errorEl.textContent = '비밀번호는 4자 이상이어야 합니다.';
          errorEl.style.display = 'block';
          return;
        }
        if (newPassword !== confirmPassword) {
          errorEl.textContent = '비밀번호가 일치하지 않습니다.';
          errorEl.style.display = 'block';
          return;
        }
        submitBtn.disabled = true;
        try {
          const r = await fetch(window.location.origin + '/api/reset-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token, newPassword }),
          });
          const data = await r.json().catch(() => ({}));
          if (!r.ok) {
            errorEl.textContent = data.error || '처리 실패';
            errorEl.style.display = 'block';
            submitBtn.disabled = false;
            return;
          }
          formWrap.style.display = 'none';
          successWrap.style.display = 'block';
        } catch (_) {
          errorEl.textContent = '네트워크 오류';
          errorEl.style.display = 'block';
          submitBtn.disabled = false;
        }
      });
    }
  </script>
</body>
</html>
